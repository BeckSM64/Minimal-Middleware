name: Build and Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build
          -DCEREAL_SERIALIZER=ON
          -DBUILD_BROKER=ON
          -DBUILD_SAMPLE_APPS=ON
          -DBUILD_PYTHON_MODULE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmw-${{ matrix.os }}
          path: build/


  smoke-test:
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build
          -DCEREAL_SERIALIZER=ON
          -DBUILD_BROKER=ON
          -DBUILD_SAMPLE_APPS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run smoke tests
        run: |
          cd build
          ./broker &
          BROKER_PID=$!
          ./subscribe &
          SUB_PID=$!
          sleep 1
          ./publish
          sleep 3
          kill $SUB_PID $BROKER_PID || true


  python-build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core pybind11

      - name: Build Python wheel
        run: python -m build .

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/


  python-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    needs: python-build

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/

      - name: Install wheel
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Verify Python binding
        run: python -c "import mmw; print('import ok', dir(mmw))"
version: '3'

vars:
  # Defaults
  BROKER: '{{.BROKER | default "OFF"}}'
  EXAMPLES: '{{.EXAMPLES | default "OFF"}}'
  PYTHON: '{{.PYTHON | default "OFF"}}'
  SERIALIZER: '{{.SERIALIZER | default "CEREAL_SERIALIZER"}}'
  SHARED: '{{.SHARED | default "OFF"}}'
  # Platform detection logic
  PYTHON_EXE: '{{if eq OS "windows"}}python{{else}}python3{{end}}'
  VCPKG_PATH: 'C:/vcpkg/scripts/buildsystems/vcpkg.cmake'

tasks:
  default:
    cmds:
      - task: build

  build:all:
    desc: Build everything
    cmds:
      - task: build
        vars: { BROKER: ON, EXAMPLES: ON, PYTHON: ON }

  build:
    desc: Build MMW with optional flags
    cmds:
      - task: cmake:configure
      - task: cmake:build
      - task: python:install
        vars: { PYTHON: '{{.PYTHON}}' }

  # --- Internal Helper Tasks ---

  cmake:configure:
    internal: true
    cmds:
      - mkdir -p build/
      - >
        cmake -S . -B build/
        -DBUILD_BROKER={{.BROKER}}
        -DBUILD_SAMPLE_APPS={{.EXAMPLES}}
        -DBUILD_PYTHON_MODULE={{.PYTHON}}
        -D{{.SERIALIZER}}=ON
        -DBUILD_SHARED_LIBRARY={{.SHARED}}
        {{if eq OS "windows"}}
        -DCMAKE_TOOLCHAIN_FILE={{.VCPKG_PATH}} 
        -G "Unix Makefiles"
        {{end}}

  cmake:build:
    internal: true
    cmds:
      - cmake --build build/ --config Release -j

  python:install:
    internal: true
    dir: python
    # This 'run: once' prevents double-running if called multiple times
    # The 'status' check skips the task if PYTHON is not ON
    status:
      - test "{{.PYTHON}}" != "ON"
    cmds:
      - "{{.PYTHON_EXE}} -m pip install -r ../requirements.txt"
      - "{{.PYTHON_EXE}} -m build ."
      - "{{.PYTHON_EXE}} -m pip install dist/*.whl --force-reinstall"

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf build/
      - rm -rf python/dist/
      - rm -rf python/build/
      - rm -rf python/mmw.egg-info

  docs:
    desc: Build Doxygen + Sphinx documentation
    cmds:
      - doxygen Doxyfile
      - cd docs && {{.PYTHON_EXE}} -m sphinx -b html source build/html

  docs:clean:
    desc: Clean documentation
    cmds:
      - rm -rf docs/build docs/doxygen/xml
